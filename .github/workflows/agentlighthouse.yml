name: AgentLighthouse

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agent-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run AgentLighthouse dogfood scan
        run: |
          pnpm --filter @agentlighthouse/cli dev scan . \
            --baseline agentlighthouse-baseline.json \
            --report-dir agentlighthouse-reports \
            --comparison-format pr-summary \
            --comparison-output agentlighthouse-delta.md \
            --fail-under 80 \
            --min-confidence medium \
            --fail-on-regression
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agentlighthouse-reports
          path: |
            agentlighthouse-reports
            agentlighthouse-delta.md
