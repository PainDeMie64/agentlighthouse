name: False positive or false negative
description: Report a finding that seems wrong, missing, or poorly prioritized.
title: "[Finding]: "
labels: ["scanner-feedback"]
body:
  - type: markdown
    attributes:
      value: Please share enough context to improve the rule, but redact secrets and private code.
  - type: dropdown
    id: kind
    attributes:
      label: Feedback type
      options:
        - False positive
        - False negative
        - Severity feels wrong
        - Recommendation is unclear
    validations:
      required: true
  - type: input
    id: rule
    attributes:
      label: Rule ID or finding title
      placeholder: "OPENAPI_AUTH_UNCLEAR, Missing AGENTS.md, ..."
  - type: textarea
    id: why
    attributes:
      label: Why does it seem wrong?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Relevant sanitized evidence
      description: Paste a short redacted snippet, report excerpt, or repo structure.
  - type: input
    id: profile
    attributes:
      label: Profile used
      placeholder: "default, devtool, api, mcp, docs, library, internal"
  - type: input
    id: score
    attributes:
      label: Score, confidence, and coverage
      placeholder: "Score 72, confidence medium, coverage 68%"
