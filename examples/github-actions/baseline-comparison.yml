name: AgentLighthouse Baseline Comparison

on:
  pull_request:

jobs:
  agent-readiness-delta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PainDeMie64/agentlighthouse@main
        with:
          path: "."
          baseline: agentlighthouse-baseline.json
          comparison-output: agentlighthouse-delta.md
          comparison-format: markdown
          fail-on-regression: "true"
          fail-on-new-severity: high
