name: AgentLighthouse
description: Experimental source-based AgentLighthouse action for local-first agent-readiness scans in CI.
branding:
  icon: activity
  color: blue
inputs:
  path:
    description: Path inside the caller workspace to scan.
    required: false
    default: "."
  profile:
    description: "Scan profile: default, devtool, api, mcp, docs, library, or internal."
    required: false
    default: ""
  fail-under:
    description: Fail when the AgentLighthouse score is below this number.
    required: false
    default: ""
  fail-on-severity:
    description: Fail when any finding is at or above this severity.
    required: false
    default: ""
  min-confidence:
    description: Fail when score confidence is below this level.
    required: false
    default: ""
  probes:
    description: Set to "commands" to enable opt-in command probes.
    required: false
    default: ""
  output-json:
    description: Write agentlighthouse-report.json.
    required: false
    default: "true"
  output-markdown:
    description: Write agentlighthouse-report.md.
    required: false
    default: "true"
  output-sarif:
    description: Write agentlighthouse-report.sarif.
    required: false
    default: "false"
  output-pr-summary:
    description: Write agentlighthouse-pr-summary.md.
    required: false
    default: "true"
  report-dir:
    description: Optional report bundle directory inside the caller workspace.
    required: false
    default: ""
  github-step-summary:
    description: Append a concise summary to the GitHub step summary.
    required: false
    default: "true"
  baseline:
    description: Optional baseline AgentLighthouse JSON report path inside the caller workspace.
    required: false
    default: ""
  comparison-output:
    description: Comparison report output path inside the caller workspace.
    required: false
    default: agentlighthouse-delta.md
  comparison-format:
    description: "Comparison output format: text, json, markdown, or pr-summary."
    required: false
    default: pr-summary
  fail-on-regression:
    description: Fail when the baseline comparison detects a regression.
    required: false
    default: "false"
  fail-on-score-drop:
    description: Fail when the score drops by at least this many points.
    required: false
    default: ""
  fail-on-coverage-drop:
    description: Fail when coverage drops by at least this many points.
    required: false
    default: ""
  fail-on-confidence-drop:
    description: Fail when confidence score drops by at least this many points.
    required: false
    default: ""
  fail-on-new-severity:
    description: Fail when a new finding is at or above this severity.
    required: false
    default: ""
  changed-files:
    description: Optional changed-files list path inside the caller workspace.
    required: false
    default: ""
  git-base:
    description: Optional git base ref for PR-aware comparison.
    required: false
    default: ""
  git-head:
    description: Optional git head ref for PR-aware comparison.
    required: false
    default: ""
  pr-mode:
    description: Set to "true" to enable PR-aware comparison summaries when changed-file context is available.
    required: false
    default: "false"
  fail-on-new-changed-severity:
    description: Fail when a new finding at or above this severity appears on changed files.
    required: false
    default: ""
  fail-on-new-changed-high:
    description: Fail when a new high or critical finding appears on changed files.
    required: false
    default: "false"
  fail-on-new-changed-critical:
    description: Fail when a new critical finding appears on changed files.
    required: false
    default: "false"
  fail-on-pr-regression:
    description: Fail when score drops or a high/critical finding appears on changed files.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.33.0
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: pnpm
        cache-dependency-path: ${{ github.action_path }}/pnpm-lock.yaml
    - name: Install AgentLighthouse
      shell: bash
      run: pnpm --dir "$GITHUB_ACTION_PATH" install --frozen-lockfile
    - name: Build AgentLighthouse
      shell: bash
      run: pnpm --dir "$GITHUB_ACTION_PATH" build
    - name: Run AgentLighthouse
      shell: bash
      run: |
        set -euo pipefail

        scan_path="$GITHUB_WORKSPACE/${{ inputs.path }}"
        common_args=()
        gate_args=()
        comparison_args=()
        output_args=()

        if [ -n "${{ inputs.profile }}" ]; then
          common_args+=(--profile "${{ inputs.profile }}")
        fi

        if [ "${{ inputs.probes }}" = "commands" ]; then
          common_args+=(--probe commands)
        fi

        if [ -n "${{ inputs.fail-under }}" ]; then
          gate_args+=(--fail-under "${{ inputs.fail-under }}")
        fi

        if [ -n "${{ inputs.fail-on-severity }}" ]; then
          gate_args+=(--fail-on-severity "${{ inputs.fail-on-severity }}")
        fi

        if [ -n "${{ inputs.min-confidence }}" ]; then
          gate_args+=(--min-confidence "${{ inputs.min-confidence }}")
        fi

        if [ -n "${{ inputs.report-dir }}" ]; then
          output_args+=(--report-dir "$GITHUB_WORKSPACE/${{ inputs.report-dir }}")
        fi

        if [ "${{ inputs.output-json }}" = "true" ]; then
          pnpm --dir "$GITHUB_ACTION_PATH" --filter @agentlighthouse/cli dev scan "$scan_path" \
            "${common_args[@]}" \
            --format json \
            --output "$GITHUB_WORKSPACE/agentlighthouse-report.json"
        fi

        if [ -n "${{ inputs.baseline }}" ] && [ "${{ inputs.output-json }}" != "true" ]; then
          pnpm --dir "$GITHUB_ACTION_PATH" --filter @agentlighthouse/cli dev scan "$scan_path" \
            "${common_args[@]}" \
            --format json \
            --output "$GITHUB_WORKSPACE/agentlighthouse-report.json"
        fi

        if [ "${{ inputs.output-markdown }}" = "true" ]; then
          pnpm --dir "$GITHUB_ACTION_PATH" --filter @agentlighthouse/cli dev scan "$scan_path" \
            "${common_args[@]}" \
            --format markdown \
            --output "$GITHUB_WORKSPACE/agentlighthouse-report.md"
        fi

        if [ "${{ inputs.output-sarif }}" = "true" ]; then
          pnpm --dir "$GITHUB_ACTION_PATH" --filter @agentlighthouse/cli dev scan "$scan_path" \
            "${common_args[@]}" \
            --format sarif \
            --output "$GITHUB_WORKSPACE/agentlighthouse-report.sarif"
        fi

        summary_args=()
        if [ "${{ inputs.github-step-summary }}" = "true" ]; then
          summary_args+=(--github-step-summary)
        fi

        if [ -n "${{ inputs.baseline }}" ]; then
          comparison_args+=(--baseline "$GITHUB_WORKSPACE/${{ inputs.baseline }}")
          comparison_args+=(--comparison-format "${{ inputs.comparison-format }}")
          comparison_args+=(--comparison-output "$GITHUB_WORKSPACE/${{ inputs.comparison-output }}")

          if [ "${{ inputs.fail-on-regression }}" = "true" ]; then
            comparison_args+=(--fail-on-regression)
          fi

          if [ -n "${{ inputs.fail-on-score-drop }}" ]; then
            comparison_args+=(--fail-on-score-drop "${{ inputs.fail-on-score-drop }}")
          fi

          if [ -n "${{ inputs.fail-on-coverage-drop }}" ]; then
            comparison_args+=(--fail-on-coverage-drop "${{ inputs.fail-on-coverage-drop }}")
          fi

          if [ -n "${{ inputs.fail-on-confidence-drop }}" ]; then
            comparison_args+=(--fail-on-confidence-drop "${{ inputs.fail-on-confidence-drop }}")
          fi

          if [ -n "${{ inputs.fail-on-new-severity }}" ]; then
            comparison_args+=(--fail-on-new-severity "${{ inputs.fail-on-new-severity }}")
          fi

          if [ -n "${{ inputs.changed-files }}" ]; then
            comparison_args+=(--changed-files "$GITHUB_WORKSPACE/${{ inputs.changed-files }}")
          elif [ -n "${{ inputs.git-base }}" ] || [ -n "${{ inputs.git-head }}" ]; then
            comparison_args+=(--git-base "${{ inputs.git-base }}" --git-head "${{ inputs.git-head }}")
          fi

          if [ -n "${{ inputs.fail-on-new-changed-severity }}" ]; then
            comparison_args+=(--fail-on-new-changed-severity "${{ inputs.fail-on-new-changed-severity }}")
          fi

          if [ "${{ inputs.fail-on-new-changed-high }}" = "true" ]; then
            comparison_args+=(--fail-on-new-changed-high)
          fi

          if [ "${{ inputs.fail-on-new-changed-critical }}" = "true" ]; then
            comparison_args+=(--fail-on-new-changed-critical)
          fi

          if [ "${{ inputs.fail-on-pr-regression }}" = "true" ]; then
            comparison_args+=(--fail-on-pr-regression)
          fi
        fi

        final_output_args=()
        if [ "${{ inputs.output-pr-summary }}" = "true" ]; then
          final_output_args+=(--format pr-summary --output "$GITHUB_WORKSPACE/agentlighthouse-pr-summary.md")
        else
          final_output_args+=(--format text)
        fi

        set +e
        pnpm --dir "$GITHUB_ACTION_PATH" --filter @agentlighthouse/cli dev scan "$scan_path" \
          "${common_args[@]}" \
          "${gate_args[@]}" \
          "${comparison_args[@]}" \
          "${output_args[@]}" \
          "${summary_args[@]}" \
          "${final_output_args[@]}"
        scan_status=$?
        set -e

        if [ "${{ inputs.github-step-summary }}" = "true" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -n "${{ inputs.baseline }}" ] && [ -f "$GITHUB_WORKSPACE/${{ inputs.comparison-output }}" ]; then
          {
            echo ""
            echo "---"
            cat "$GITHUB_WORKSPACE/${{ inputs.comparison-output }}"
          } >> "$GITHUB_STEP_SUMMARY"
        fi

        exit "$scan_status"
